<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal de certificados - Inicio de sesión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css?v=5">
</head>
<body>

<div class="header-uaeh">
    <h1>Universidad Autónoma del Estado de Hidalgo</h1>
    <h2>Dirección de Administración Escolar</h2>
    <h3>Área de Trámites y Certificados</h3>
</div>
<div class="subtitulo-portal">Portal de consulta de trámites</div>

<div class="login-container">
    <h2 style="text-align: center;">Acceso al Portal</h2>
    <p id="error" style="color:red; text-align:center; display:none;"></p>

    <form id="loginForm">
        <label>Usuario</label>
        <input name="usuario" id="usuario" placeholder="Tu usuario" required>

        <label>NIP</label>
        <input name="nip" id="nip" type="password" placeholder="Tu NIP" required>

        <button type="submit">Entrar</button>
    </form>
</div>

<div class="footer-firma">Manuel Zarazúa — marzo 2026</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const usuario = document.getElementById("usuario").value;
    const nip = document.getElementById("nip").value;
    const error = document.getElementById("error");
    error.style.display = "none";

    const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ usuario, nip })
    });

    const data = await res.json();
    if (!data.ok) {
        error.textContent = data.error;
        error.style.display = "block";
        return;
    }
    localStorage.setItem("reportes", JSON.stringify(data));
    if (data.admin) window.location.href = "/admin.html";
    else window.location.href = "/tabla.html";
});
</script>
</body>
</html>
