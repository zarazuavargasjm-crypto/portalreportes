<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal de certificados - Consulta</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css?v=5">
</head>
<body>

<div class="top-right"><a href="/" class="btn-logout">Cerrar sesión</a></div>

<div class="header-uaeh">
    <h1>Universidad Autónoma del Estado de Hidalgo</h1>
    <h2>Dirección de Administración Escolar</h2>
    <h3>Área de Trámites y Certificados</h3>
</div>
<div class="subtitulo-portal">Portal de consulta de trámites</div>

<div class="table-container">
    <h2>Institución: <span id="inst"></span></h2>

    <div class="filters">
        <div><label>Cuenta:</label><input type="text" id="fc" placeholder="Buscar cuenta"></div>
        <div><label>Folio:</label><input type="text" id="ff" placeholder="Buscar folio"></div>
        <div>
            <label>Estatus:</label>
            <select id="fe">
                <option value="">Todos</option>
                <option value="Entregado">Entregado</option>
                <option value="Pendiente">Pendiente</option>
            </select>
        </div>
    </div>

    <div style="overflow-x:auto;">
        <table id="t">
            <thead><tr id="thead"></tr></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <div id="paginacion"></div>
</div>

<div class="footer-firma">Manuel Zarazúa — abril 2026</div>

<script>
const data = JSON.parse(localStorage.getItem("reportes"));
if (!data || data.admin) window.location.href = "/";

document.getElementById("inst").textContent = data.institucion;

const headers = data.headers;
const filas = data.reportes;

document.getElementById("thead").innerHTML =
    headers.map((h, i) => `<th onclick="ordenar(${i})">${h}</th>`).join("");

let pagina = 1;
const porPagina = 30;

// FUNCIÓN DE FILTRO POR ANTIGÜEDAD (SOLO PARA USUARIOS)
function esVisibleParaUsuario(estatus, fechaTexto) {
    if (estatus !== "Entregado") return true; // Los pendientes siempre se ven
    if (!fechaTexto) return false;

    // Calculamos la fecha limite (hoy menos 30 días)
    const hoy = new Date();
    const limite = new Date();
    limite.setDate(hoy.getDate() - 30);

    // Formato esperado en Excel: DD/MM/YYYY
    const partes = fechaTexto.split('/');
    if (partes.length === 3) {
        const fechaEntrega = new Date(partes[2], partes[1] - 1, partes[0]);
        // Si la entrega es posterior al límite (menos de un mes), es visible
        return fechaEntrega >= limite;
    }
    return false;
}

function renderTabla() {
    const cVal = fc.value.toLowerCase();
    const fVal = ff.value.toLowerCase();
    const eVal = fe.value;

    const filtrados = filas.filter(f => {
        const est = (f[12] || "").trim(); // Columna M: Estatus
        const fecha = f[11] || "";        // Columna L: Fecha de Entrega

        // APLICAR RESTRICCIÓN DE UN MES
        if (!esVisibleParaUsuario(est, fecha)) return false;

        // FILTROS DE BÚSQUEDA NORMALES
        return (
            f[1].toLowerCase().includes(cVal) &&
            f[9].toLowerCase().includes(fVal) &&
            (eVal === "" || est === eVal)
        );
    });

    const inicio = (pagina - 1) * porPagina;
    const pag = filtrados.slice(inicio, inicio + porPagina);

    tbody.innerHTML = pag.map(f => {
        const est = f[12] || "";
        return `<tr class="${est === 'Entregado' ? 'tr-entregado' : ''}">
            ${f.map(c => `<td>${c}</td>`).join("")}
        </tr>`;
    }).join("");

    let botones = "";
    const total = Math.ceil(filtrados.length / porPagina);
    for (let i = 1; i <= total; i++) {
        botones += `<button class="pag-btn" onclick="pagina=${i};renderTabla()">${i}</button>`;
    }
    paginacion.innerHTML = botones;
}

fc.oninput = renderTabla;
ff.oninput = renderTabla;
fe.onchange = renderTabla;

let asc = true;
function ordenar(n) {
    filas.sort((a, b) => {
        const va = (a[n] || "").toLowerCase();
        const vb = (b[n] || "").toLowerCase();
        if (va > vb) return asc ? 1 : -1;
        if (va < vb) return asc ? -1 : 1;
        return 0;
    });
    asc = !asc;
    renderTabla();
}

renderTabla();
</script>

</body>
</html>
