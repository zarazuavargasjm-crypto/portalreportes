<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal de certificados - Consulta</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css?v=5">
</head>
<body>

<div class="top-right"><a href="/" class="btn-logout">Cerrar sesión</a></div>

<div class="header-uaeh">
    <h1>Universidad Autónoma del Estado de Hidalgo</h1>
    <h2>Dirección de Administración Escolar</h2>
    <h3>Área de Trámites y Certificados</h3>
</div>
<div class="subtitulo-portal">Portal de consulta de trámites</div>

<div class="table-container">
    <h2>Institución: <span id="inst"></span></h2>

    <div class="filters">
        <div><label>Cuenta:</label><input type="text" id="fc" placeholder="Buscar cuenta"></div>
        <div><label>Folio:</label><input type="text" id="ff" placeholder="Buscar folio"></div>
        <div>
            <label>Estatus:</label>
            <select id="fe">
                <option value="">Todos</option>
                <option value="Entregado">Entregado</option>
                <option value="Pendiente">Pendiente</option>
            </select>
        </div>
    </div>

    <div style="overflow-x:auto;">
        <table id="t">
            <thead><tr id="thead"></tr></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <div id="paginacion"></div>
</div>

<div class="footer-firma">Manuel Zarazúa — abril 2026</div>

<script>
const data = JSON.parse(localStorage.getItem("reportes"));
if (!data || data.admin) window.location.href = "/";

document.getElementById("inst").textContent = data.institucion;

const headers = data.headers;
const filas = data.reportes;

document.getElementById("thead").innerHTML =
    headers.map((h, i) => `<th onclick="ordenar(${i})">${h}</th>`).join("");

let pagina = 1;
const porPagina = 30;

// FUNCIÓN PARA CONVERTIR "martes, 20 de enero de 2026" A OBJETO FECHA
function parsearFechaEspañol(texto) {
    if (!texto) return null;
    const meses = {
        "enero": 0, "febrero": 1, "marzo": 2, "abril": 3, "mayo": 4, "junio": 5,
        "julio": 6, "agosto": 7, "septiembre": 8, "octubre": 9, "noviembre": 10, "diciembre": 11
    };
    
    try {
        // Limpiamos el texto: quitamos el día de la semana y la palabra "de"
        // Ejemplo: "martes, 20 de enero de 2026" -> ["20", "enero", "2026"]
        const limpia = texto.toLowerCase().split(',').pop().replace(/de/g, '').trim();
        const partes = limpia.split(/\s+/); // Divide por espacios
        
        if (partes.length >= 3) {
            const dia = parseInt(partes[0]);
            const mes = meses[partes[1]];
            const anio = parseInt(partes[2]);
            return new Date(anio, mes, dia);
        }
    } catch (e) {
        return null;
    }
    return null;
}

function verificarVisibilidad(fila) {
    const estatus = (fila[12] || "").trim(); // Columna M
    const fechaTexto = (fila[11] || "").trim(); // Columna L

    if (estatus !== "Entregado") return true;
    
    const fechaEntrega = parsearFechaEspañol(fechaTexto);
    if (!fechaEntrega) return false;

    const hoy = new Date();
    const diferenciaMs = hoy - fechaEntrega;
    const treintaDiasMs = 30 * 24 * 60 * 60 * 1000;

    return diferenciaMs <= treintaDiasMs;
}

function renderTabla() {
    const cVal = fc.value.toLowerCase();
    const fVal = ff.value.toLowerCase();
    const eVal = fe.value;

    const filtrados = filas.filter(f => {
        if (!verificarVisibilidad(f)) return false;
        const est = (f[12] || "").trim();
        return (
            f[1].toLowerCase().includes(cVal) &&
            f[9].toLowerCase().includes(fVal) &&
            (eVal === "" || est === eVal)
        );
    });

    const inicio = (pagina - 1) * porPagina;
    const pag = filtrados.slice(inicio, inicio + porPagina);

    tbody.innerHTML = pag.map(f => {
        const est = (f[12] || "").trim();
        return `<tr class="${est === 'Entregado' ? 'tr-entregado' : ''}">
            ${f.map(c => `<td>${c}</td>`).join("")}
        </tr>`;
    }).join("");

    let botones = "";
    const total = Math.ceil(filtrados.length / porPagina);
    for (let i = 1; i <= total; i++) {
        botones += `<button class="pag-btn" onclick="pagina=${i};renderTabla()">${i}</button>`;
    }
    paginacion.innerHTML = botones;
}

fc.oninput = renderTabla;
ff.oninput = renderTabla;
fe.onchange = renderTabla;

let asc = true;
function ordenar(n) {
    filas.sort((a, b) => {
        const va = (a[n] || "").toLowerCase();
        const vb = (b[n] || "").toLowerCase();
        if (va > vb) return asc ? 1 : -1;
        if (va < vb) return asc ? -1 : 1;
        return 0;
    });
    asc = !asc;
    renderTabla();
}

renderTabla();
</script>
</body>
</html>
