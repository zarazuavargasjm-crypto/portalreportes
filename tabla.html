<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="top-right"><a href="/" class="btn-logout">Cerrar sesión</a></div>
<div class="header-uaeh">
    <h1>Universidad Autónoma del Estado de Hidalgo</h1>
    <h2>Dirección de Administración Escolar</h2>
    <h3>Área de Trámites y Certificados</h3>
</div>
<div class="table-container">
    <h2>Institución: <span id="institucion"></span></h2>
    <div class="filters">
        <div><label>Cuenta:</label><input type="text" id="fc" placeholder="Buscar cuenta"></div>
        <div><label>Folio:</label><input type="text" id="ff" placeholder="Buscar folio"></div>
        <div>
            <label>Estatus:</label>
            <select id="fe">
                <option value="">Todos</option>
                <option value="Entregado">Entregado</option>
                <option value="Pendiente">Pendiente</option>
            </select>
        </div>
    </div>
    <div style="overflow-x: auto;">
        <table id="t">
            <thead>
                <tr id="thead"></tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>
<div class="footer-firma">Manuel Zarazúa — abril 2026</div>
<script>
const dataT = JSON.parse(localStorage.getItem("reportes"));
if (!dataT || dataT.admin || !dataT.reportes) window.location.href = "/";

document.getElementById("institucion").textContent = dataT.institucion || "";

const headersT = dataT.headers || [];
const filasT = dataT.reportes || [];

document.getElementById("thead").innerHTML =
    headersT.map((h, idx) => `<th onclick="ordenar(${idx})">${h}</th>`).join("");

const tbody = document.getElementById("tbody");
const fc = document.getElementById("fc");
const ff = document.getElementById("ff");
const fe = document.getElementById("fe");

function esAntiguo(fechaStr) {
    if (!fechaStr) return false;
    const fecha = new Date(fechaStr);
    if (isNaN(fecha)) return false;
    const hoy = new Date();
    const diff = hoy - fecha;
    return diff > 30 * 24 * 60 * 60 * 1000;
}

function renderTabla() {
    const cVal = fc.value.toLowerCase();
    const fVal = ff.value.toLowerCase();
    const eVal = fe.value;

    const filtrados = filasT.filter(row => {
        const est = (row[12] || "").trim();
        const fechaEntrega = row[11] || "";

        if (est === "Entregado" && esAntiguo(fechaEntrega)) return false;

        return (
            (row[1] || "").toLowerCase().includes(cVal) &&
            (row[9] || "").toLowerCase().includes(fVal) &&
            (eVal === "" || est === eVal)
        );
    });

    tbody.innerHTML = filtrados.map(fila => {
        const est = fila[12] || "";
        return `<tr class="r ${est === 'Entregado' ? 'tr-entregado' : ''}">
            ${fila.map(c => `<td>${c}</td>`).join("")}
        </tr>`;
    }).join("");
}

fc.addEventListener("input", renderTabla);
ff.addEventListener("input", renderTabla);
fe.addEventListener("change", renderTabla);

let dirAsc = true;
function ordenar(n) {
    filasT.sort((a, b) => {
        const va = (a[n] || "").toString().toLowerCase();
        const vb = (b[n] || "").toString().toLowerCase();
        if (va > vb) return dirAsc ? 1 : -1;
        if (va < vb) return dirAsc ? -1 : 1;
        return 0;
    });
    dirAsc = !dirAsc;
    renderTabla();
}

renderTabla();
</script>
</body>
</html>
