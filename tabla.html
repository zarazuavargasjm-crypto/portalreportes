<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal de certificados - Consulta</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css?v=5">
</head>
<body>

<div class="top-right"><a href="/" class="btn-logout">Cerrar sesión</a></div>

<div class="header-uaeh">
    <h1>Universidad Autónoma del Estado de Hidalgo</h1>
    <h2>Dirección de Administración Escolar</h2>
    <h3>Área de Trámites y Certificados</h3>
</div>
<div class="subtitulo-portal">Portal de consulta de trámites</div>

<div class="table-container">
    <h2>Institución: <span id="inst"></span></h2>

    <div class="filters">
        <div><label>Cuenta:</label><input type="text" id="fc" placeholder="Buscar cuenta"></div>
        <div><label>Folio:</label><input type="text" id="ff" placeholder="Buscar folio"></div>
        <div>
            <label>Estatus:</label>
            <select id="fe">
                <option value="">Todos</option>
                <option value="Entregado">Entregado</option>
                <option value="Pendiente">Pendiente</option>
            </select>
        </div>
    </div>

    <div style="overflow-x:auto;">
        <table id="t">
            <thead><tr id="thead"></tr></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <div id="paginacion"></div>
</div>

<div class="footer-firma">Manuel Zarazúa — marzo 2026</div>

<script>
const data = JSON.parse(localStorage.getItem("reportes"));
if (!data || data.admin) window.location.href = "/";

document.getElementById("inst").textContent = data.institucion;

const headers = data.headers;
const filas = data.reportes;

document.getElementById("thead").innerHTML =
    headers.map((h, i) => `<th onclick="ordenar(${i})">${h}</th>`).join("");

let pagina = 1;
const porPagina = 30;

// PROCESADOR DE FECHAS ULTRA FLEXIBLE
function parsearCualquierFecha(texto) {
    if (!texto) return null;
    // Limpiamos espacios raros y pasamos a minúsculas
    let t = texto.toLowerCase().trim().replace(/,/g, '');
    
    const meses = {
        "enero": 0, "febrero": 1, "marzo": 2, "abril": 3, "mayo": 4, "junio": 5,
        "julio": 6, "agosto": 7, "septiembre": 8, "octubre": 9, "noviembre": 10, "diciembre": 11
    };

    // Intento 1: Formato 20/1/2026
    if (t.includes('/')) {
        const p = t.split('/');
        if (p.length === 3) return new Date(p[2], p[1] - 1, p[0]);
    }

    // Intento 2: Formato "martes 20 de enero de 2026"
    if (t.includes(' de ')) {
        const partes = t.replace(/de/g, '').split(/\s+/);
        // Buscamos cuál de las partes es un número (el día) y cuál es el mes
        let dia, mes, anio;
        partes.forEach(p => {
            if (meses[p] !== undefined) mes = meses[p];
            else if (!isNaN(p) && p.length <= 2) dia = parseInt(p);
            else if (!isNaN(p) && p.length === 4) anio = parseInt(p);
        });
        if (dia && mes !== undefined && anio) return new Date(anio, mes, dia);
    }

    return null;
}

function verificarVisibilidad(fila) {
    const estatus = (fila[12] || "").trim(); // Columna M
    const fechaTexto = (fila[11] || "").trim(); // Columna L

    if (estatus !== "Entregado") return true;
    if (!fechaTexto) return true; // Si no hay fecha, lo mostramos para no ocultar info por error

    const fechaEntrega = parsearCualquierFecha(fechaTexto);
    if (!fechaEntrega) {
        console.warn("No se pudo entender esta fecha:", fechaTexto);
        return true; 
    }

    const hoy = new Date();
    // Ponemos hoy a las 00:00:00 para comparar solo días
    hoy.setHours(0, 0, 0, 0);
    fechaEntrega.setHours(0, 0, 0, 0);

    const diferenciaMs = hoy - fechaEntrega;
    const treintaDiasMs = 30 * 24 * 60 * 60 * 1000;

    // DEBUG: Descomenta la siguiente línea para ver el cálculo en la consola (F12)
    // console.log(`Fecha: ${fechaTexto} | Días: ${diferenciaMs / (treintaDiasMs/30)}`);

    return diferenciaMs <= treintaDiasMs;
}

function renderTabla() {
    const cVal = fc.value.toLowerCase();
    const fVal = ff.value.toLowerCase();
    const eVal = fe.value;

    const filtrados = filas.filter(f => {
        if (!verificarVisibilidad(f)) return false;
        const est = (f[12] || "").trim();
        return (
            f[1].toLowerCase().includes(cVal) &&
            f[9].toLowerCase().includes(fVal) &&
            (eVal === "" || est === eVal)
        );
    });

    const inicio = (pagina - 1) * porPagina;
    const pag = filtrados.slice(inicio, inicio + porPagina);

    tbody.innerHTML = pag.map(f => {
        const est = (f[12] || "").trim();
        return `<tr class="${est === 'Entregado' ? 'tr-entregado' : ''}">
            ${f.map(c => `<td>${c}</td>`).join("")}
        </tr>`;
    }).join("");

    let botones = "";
    const total = Math.ceil(filtrados.length / porPagina);
    for (let i = 1; i <= total; i++) {
        botones += `<button class="pag-btn" onclick="pagina=${i};renderTabla()">${i}</button>`;
    }
    paginacion.innerHTML = botones;
}

fc.oninput = renderTabla;
ff.oninput = renderTabla;
fe.onchange = renderTabla;

let asc = true;
function ordenar(n) {
    filas.sort((a, b) => {
        const va = (a[n] || "").toLowerCase();
        const vb = (b[n] || "").toLowerCase();
        if (va > vb) return asc ? 1 : -1;
        if (va < vb) return asc ? -1 : 1;
        return 0;
    });
    asc = !asc;
    renderTabla();
}

renderTabla();
</script>
</body>
</html>
