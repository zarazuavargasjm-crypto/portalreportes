<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="top-right"><a href="/" class="btn-logout">Cerrar sesión</a></div>

<div class="header-uaeh">
    <h1>Universidad Autónoma del Estado de Hidalgo</h1>
    <h2>Dirección de Administración Escolar</h2>
    <h3>Área de Trámites y Certificados</h3>
</div>

<div class="table-container">
    <h2>Institución: <span id="inst"></span></h2>

    <div class="filters">
        <div><label>Cuenta:</label><input type="text" id="fc" placeholder="Buscar cuenta"></div>
        <div><label>Folio:</label><input type="text" id="ff" placeholder="Buscar folio"></div>
        <div>
            <label>Estatus:</label>
            <select id="fe">
                <option value="">Todos</option>
                <option value="Entregado">Entregado</option>
                <option value="Pendiente">Pendiente</option>
            </select>
        </div>
    </div>

    <div style="overflow-x: auto;">
        <table id="t">
            <thead><tr id="thead"></tr></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <div id="paginacion"></div>
</div>

<div class="footer-firma">Manuel Zarazúa — abril 2026</div>

<script>
const data = JSON.parse(localStorage.getItem("reportes"));
if (!data || !data.reportes) window.location.href = "/";

document.getElementById("inst").textContent = data.institucion;

const headers = data.headers;
const filas = data.reportes;

// Encabezados
document.getElementById("thead").innerHTML =
    headers.map((h, i) => `<th onclick="ordenar(${i})">${h}</th>`).join("");

// Paginación
let pagina = 1;
const porPagina = 30;

function renderTabla() {
    const cVal = fc.value.toLowerCase();
    const fVal = ff.value.toLowerCase();
    const eVal = fe.value;

    let filtrados = filas.filter(f => {
        const est = f[12] || "";
        return (
            f[1].toLowerCase().includes(cVal) &&
            f[9].toLowerCase().includes(fVal) &&
            (eVal === "" || est === eVal)
        );
    });

    const inicio = (pagina - 1) * porPagina;
    const pag = filtrados.slice(inicio, inicio + porPagina);

    tbody.innerHTML = pag.map(f => {
        const est = f[12] || "";
        return `<tr class="r ${est === 'Entregado' ? 'tr-entregado' : ''}">
            ${f.map(c => `<td>${c}</td>`).join("")}
        </tr>`;
    }).join("");

    // Paginación
    let pagBtns = "";
    const total = Math.ceil(filtrados.length / porPagina);
    for (let i = 1; i <= total; i++) {
        pagBtns += `<button class="pag-btn" onclick="pagina=${i};renderTabla()">${i}</button>`;
    }
    paginacion.innerHTML = pagBtns;
}

renderTabla();

fc.oninput = renderTabla;
ff.oninput = renderTabla;
fe.onchange = renderTabla;

// Ordenamiento original
let asc = true;
function ordenar(n) {
    filas.sort((a, b) =>
        asc
            ? (a[n] > b[n] ? 1 : -1)
            : (a[n] < b[n] ? 1 : -1)
    );
    asc = !asc;
    renderTabla();
}
</script>

</body>
</html>
