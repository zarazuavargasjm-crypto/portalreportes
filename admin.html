<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="top-right"><a href="/" class="btn-logout">Cerrar sesión</a></div>
<div class="header-uaeh">
    <h1>Universidad Autónoma del Estado de Hidalgo</h1>
    <h2>Dirección de Administración Escolar</h2>
    <h3>Área de Trámites y Certificados</h3>
</div>
<div class="table-container">
    <h2>Panel Administrativo</h2>
    <div class="filters">
        <div><label>Cuenta:</label><input type="text" id="ac" placeholder="Cuenta"></div>
        <div><label>Folio:</label><input type="text" id="af" placeholder="Folio"></div>
        <div><label>Institución:</label><input type="text" id="ai" placeholder="Institución"></div>
        <div>
            <label>Estatus:</label>
            <select id="ae">
                <option value="">Todos</option>
                <option value="Entregado">Entregado</option>
                <option value="Pendiente">Pendiente</option>
            </select>
        </div>
        <button onclick="window.print()" style="height:32px; align-self:flex-end;">PDF</button>
    </div>
    <div style="overflow-x: auto;">
        <table id="ta">
            <thead>
                <tr id="theadA"></tr>
            </thead>
            <tbody id="tbodyA"></tbody>
        </table>
    </div>
</div>
<div class="footer-firma">Manuel Zarazúa — abril 2026</div>
<script>
const dataA = JSON.parse(localStorage.getItem("reportes"));
if (!dataA || !dataA.admin) window.location.href = "/";

const headersA = dataA.headers || [];
const filasA = dataA.reportes || [];

document.getElementById("theadA").innerHTML =
    headersA.map((h, idx) => `<th onclick="ordenarAdmin(${idx})">${h}</th>`).join("");

const tbodyA = document.getElementById("tbodyA");
const ac = document.getElementById("ac");
const af = document.getElementById("af");
const ai = document.getElementById("ai");
const ae = document.getElementById("ae");

function renderAdmin() {
    const c = ac.value.toLowerCase();
    const f = af.value.toLowerCase();
    const i = ai.value.toLowerCase();
    const e = ae.value;

    const filtrados = filasA.filter(row => {
        const est = (row[12] || "").trim();
        return (
            (row[1] || "").toLowerCase().includes(c) &&
            (row[9] || "").toLowerCase().includes(f) &&
            (row[5] || "").toLowerCase().includes(i) &&
            (e === "" || est === e)
        );
    });

    tbodyA.innerHTML = filtrados.map(fila => {
        const est = fila[12] || "";
        return `<tr class="ra ${est === 'Entregado' ? 'tr-entregado' : ''}">
            ${fila.map(c => `<td>${c}</td>`).join("")}
        </tr>`;
    }).join("");
}

document.querySelectorAll(".filters input, .filters select")
    .forEach(el => el.addEventListener("input", renderAdmin));

let dirAdminAsc = true;
function ordenarAdmin(n) {
    filasA.sort((a, b) => {
        const va = (a[n] || "").toString().toLowerCase();
        const vb = (b[n] || "").toString().toLowerCase();
        if (va > vb) return dirAdminAsc ? 1 : -1;
        if (va < vb) return dirAdminAsc ? -1 : 1;
        return 0;
    });
    dirAdminAsc = !dirAdminAsc;
    renderAdmin();
}

renderAdmin();
</script>
</body>
</html>
