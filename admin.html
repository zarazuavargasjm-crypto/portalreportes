<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal de certificados - Panel administrativo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css?v=5">
</head>
<body>

<div class="top-right"><a href="/" class="btn-logout">Cerrar sesión</a></div>

<div class="header-uaeh">
    <h1>Universidad Autónoma del Estado de Hidalgo</h1>
    <h2>Dirección de Administración Escolar</h2>
    <h3>Área de Trámites y Certificados</h3>
    <h4>Portal de consulta de trámites</h4>
</div>

<div class="table-container">
    <h2>Panel Administrativo</h2>

    <div class="filters">
        <div><label>Cuenta:</label><input type="text" id="ac" placeholder="Cuenta"></div>
        <div><label>Folio:</label><input type="text" id="af" placeholder="Folio"></div>
        <div><label>Institución:</label><input type="text" id="ai" placeholder="Institución"></div>
        <div>
            <label>Estatus:</label>
            <select id="ae">
                <option value="">Todos</option>
                <option value="Entregado">Entregado</option>
                <option value="Pendiente">Pendiente</option>
            </select>
        </div>
        <button onclick="window.print()" class="btn-pdf">PDF</button>
    </div>

    <div style="overflow-x:auto;">
        <table id="ta">
            <thead><tr id="theadA"></tr></thead>
            <tbody id="tbodyA"></tbody>
        </table>
    </div>

    <div id="paginacionA"></div>
</div>

<div class="footer-firma">Manuel Zarazúa — abril 2026 · Portal de certificados</div>

<script>
const dataA = JSON.parse(localStorage.getItem("reportes"));
if (!dataA || !dataA.admin) window.location.href = "/";

const headersA = dataA.headers;
const filasA = dataA.reportes;

document.getElementById("theadA").innerHTML =
    headersA.map((h, i) => `<th onclick="ordenarAdmin(${i})">${h}</th>`).join("");

let paginaA = 1;
const porPaginaA = 30;

function renderAdmin() {
    const c = ac.value.toLowerCase();
    const f = af.value.toLowerCase();
    const i = ai.value.toLowerCase();
    const e = ae.value;

    const filtrados = filasA.filter(r => {
        const est = r[12] || "";
        return (
            r[1].toLowerCase().includes(c) &&
            r[9].toLowerCase().includes(f) &&
            r[5].toLowerCase().includes(i) &&
            (e === "" || est === e)
        );
    });

    const inicio = (paginaA - 1) * porPaginaA;
    const pag = filtrados.slice(inicio, inicio + porPaginaA);

    tbodyA.innerHTML = pag.map(f => {
        const est = f[12] || "";
        return `<tr class="${est === 'Entregado' ? 'tr-entregado' : ''}">
            ${f.map(c => `<td>${c}</td>`).join("")}
        </tr>`;
    }).join("");

    let botones = "";
    const total = Math.ceil(filtrados.length / porPaginaA);
    for (let i = 1; i <= total; i++) {
        botones += `<button class="pag-btn" onclick="paginaA=${i};renderAdmin()">${i}</button>`;
    }
    paginacionA.innerHTML = botones;
}

document.querySelectorAll(".filters input, .filters select")
    .forEach(el => el.addEventListener("input", renderAdmin));

let ascA = true;
function ordenarAdmin(n) {
    filasA.sort((a, b) => {
        const va = (a[n] || "").toLowerCase();
        const vb = (b[n] || "").toLowerCase();
        if (va > vb) return ascA ? 1 : -1;
        if (va < vb) return ascA ? -1 : 1;
        return 0;
    });
    ascA = !ascA;
    renderAdmin();
}

renderAdmin();
</script>

</body>
</html>
