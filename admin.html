<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="top-right"><a href="/" class="btn-logout">Cerrar sesión</a></div>

<div class="header-uaeh">
    <h1>Universidad Autónoma del Estado de Hidalgo</h1>
    <h2>Dirección de Administración Escolar</h2>
    <h3>Área de Trámites y Certificados</h3>
</div>

<div class="table-container">
    <h2>Panel Administrativo</h2>

    <div class="filters">
        <div><label>Cuenta:</label><input type="text" id="ac" placeholder="Cuenta"></div>
        <div><label>Folio:</label><input type="text" id="af" placeholder="Folio"></div>
        <div><label>Institución:</label><input type="text" id="ai" placeholder="Institución"></div>
        <div>
            <label>Estatus:</label>
            <select id="ae">
                <option value="">Todos</option>
                <option value="Entregado">Entregado</option>
                <option value="Pendiente">Pendiente</option>
            </select>
        </div>
        <button onclick="window.print()" style="height:32px;">PDF</button>
    </div>

    <div style="overflow-x: auto;">
        <table id="ta">
            <thead><tr id="theadA"></tr></thead>
            <tbody id="tbodyA"></tbody>
        </table>
    </div>

    <div id="paginacionA"></div>
</div>

<div class="footer-firma">Manuel Zarazúa — abril 2026</div>

<script>
const data = JSON.parse(localStorage.getItem("reportes"));
if (!data || !data.admin) window.location.href = "/";

const headers = data.headers;
const filas = data.reportes;

// Encabezados
let thA = "";
headers.forEach((h, i) => thA += `<th onclick="ordenarAdmin(${i})">${h}</th>`);
document.getElementById("theadA").innerHTML = thA;

// Paginación
let paginaA = 1;
const porPaginaA = 30;

function renderTablaA() {
    const c = document.getElementById("ac").value.toLowerCase();
    const f = document.getElementById("af").value.toLowerCase();
    const i = document.getElementById("ai").value.toLowerCase();
    const e = document.getElementById("ae").value;

    let filtrados = filas.filter(r => {
        const est = r[12] || "";
        return (
            r[1].toLowerCase().includes(c) &&
            r[9].toLowerCase().includes(f) &&
            r[5].toLowerCase().includes(i) &&
            (e === "" || est === e)
        );
    });

    const inicio = (paginaA - 1) * porPaginaA;
    const pag = filtrados.slice(inicio, inicio + porPaginaA);

    let rows = "";
    pag.forEach(f => {
        const est = f[12] || "";
        rows += `<tr class="ra ${est === 'Entregado' ? 'tr-entregado' : ''}">
            ${f.map(c => `<td>${c}</td>`).join("")}
        </tr>`;
    });

    document.getElementById("tbodyA").innerHTML = rows;

    // Paginación
    let pagBtns = "";
    const total = Math.ceil(filtrados.length / porPaginaA);
    for (let i = 1; i <= total; i++) {
        pagBtns += `<button class="pag-btn" onclick="paginaA=${i};renderTablaA()">${i}</button>`;
    }
    document.getElementById("paginacionA").innerHTML = pagBtns;
}

renderTablaA();

document.querySelectorAll(".filters input, .filters select")
    .forEach(el => el.addEventListener("input", renderTablaA));

// Ordenamiento
let ascA = true;
function ordenarAdmin(n) {
    filas.sort((a, b) =>
        ascA
            ? (a[n] > b[n] ? 1 : -1)
            : (a[n] < b[n] ? 1 : -1)
    );
    ascA = !ascA;
    renderTablaA();
}
</script>

</body>
</html>
