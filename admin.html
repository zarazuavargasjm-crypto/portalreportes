<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="header-uaeh">
    <h2>Panel Administrador</h2>
</div>

<input id="busqueda" placeholder="Buscar...">

<table id="tabla">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
</table>

<footer>Manuel Zarazua – Abril 2026</footer>

<script>
const data = JSON.parse(localStorage.getItem("reportes"));
if (!data || !data.reportes || !data.admin) window.location.href = "/";

const headers = data.headers;
const filas = data.reportes;

// Encabezados
let th = "";
headers.forEach(h => th += `<th>${h}</th>`);
document.getElementById("thead").innerHTML = `<tr>${th}</tr>`;

// Filas
function renderTabla(filtrar = "") {
    let rows = "";
    filas.forEach(f => {
        const texto = f.join(" ").toLowerCase();
        if (texto.includes(filtrar.toLowerCase())) {
            let tds = "";
            f.forEach(c => tds += `<td>${c}</td>`);
            rows += `<tr>${tds}</tr>`;
        }
    });
    document.getElementById("tbody").innerHTML = rows;
}

renderTabla();

document.getElementById("busqueda").addEventListener("input", e => {
    renderTabla(e.target.value);
});
</script>

</body>
</html>
